services:
  backend:
    build:
      context: ../python-example-backend-api
    container_name: fastapi-backend
    ports:
      - "8000:8000"
    volumes:
      - ../python-example-backend-api:/src
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
